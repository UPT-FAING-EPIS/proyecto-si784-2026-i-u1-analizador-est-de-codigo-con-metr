<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | Analizador Estático</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <style>
    :root {
      --bg-a: #0f172a;
      --bg-b: #1e3a8a;
      --card-bg: #ffffff;
      --accent: #0ea5e9;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 0% 0%, rgba(14, 165, 233, 0.2), transparent 40%),
        radial-gradient(circle at 100% 100%, rgba(34, 197, 94, 0.15), transparent 35%),
        linear-gradient(135deg, var(--bg-a), var(--bg-b));
      font-family: "Segoe UI", "Noto Sans", sans-serif;
      color: #0f172a;
    }

    .dashboard-wrap {
      max-width: 1100px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    .glass-card {
      border: 0;
      border-radius: 1rem;
      background: var(--card-bg);
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.22);
    }

    .chart-box {
      height: 400px;
    }

    .metric-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      border-radius: 999px;
      padding: 0.25rem 0.75rem;
      background: #e0f2fe;
      color: #0c4a6e;
      font-size: 0.85rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="dashboard-wrap">
    <header class="glass-card p-4 p-md-5 mb-4">
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-3">
        <div>
          <h1 class="h3 mb-1">Dashboard de Evolución Técnica</h1>
          <p class="text-secondary mb-0">Seguimiento de complejidad ciclomática por análisis.</p>
        </div>
        <div class="d-flex align-items-center gap-2">
          <span class="metric-chip">Usuario: <strong id="current-user">-</strong></span>
          <button id="logout-button" class="btn btn-outline-danger btn-sm" type="button">Cerrar Sesion</button>
        </div>
      </div>
    </header>

    <section class="glass-card p-4 mb-4">
      <h2 class="h5 mb-3">Subir Código Java</h2>
      <form id="upload-form" class="row g-3" novalidate>
        <div class="col-md-9">
          <label for="code-file" class="form-label">Archivo .java</label>
          <input
            id="code-file"
            name="file"
            class="form-control"
            type="file"
            accept=".java"
            required
          />
          <div class="form-text">Se enviará a /api/analysis/upload para análisis y persistencia.</div>
        </div>
        <div class="col-md-3 d-flex align-items-end">
          <button id="upload-button" class="btn btn-primary w-100" type="submit">Analizar y Guardar</button>
        </div>
      </form>
      <div id="upload-status" class="mt-3"></div>
    </section>

    <section class="glass-card p-4">
      <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
        <h2 class="h5 mb-0">Evolución de Deuda Técnica (Complejidad)</h2>
        <button id="refresh-history" class="btn btn-outline-secondary btn-sm" type="button">Actualizar</button>
      </div>
      <div class="chart-box">
        <canvas id="historyChart"></canvas>
      </div>
      <div class="mt-3">
        <button id="export-csv" class="btn btn-success" type="button">Exportar Historial a CSV</button>
      </div>
      <div id="history-status" class="mt-3"></div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script>
    const userId = localStorage.getItem("user_id");
    if (!userId) {
      window.location.href = "/";
    }

    document.getElementById("current-user").textContent = userId || "-";

    const uploadForm = document.getElementById("upload-form");
    const codeFileInput = document.getElementById("code-file");
    const uploadStatus = document.getElementById("upload-status");
    const historyStatus = document.getElementById("history-status");
    const refreshBtn = document.getElementById("refresh-history");
    const exportCsvBtn = document.getElementById("export-csv");
    const logoutButton = document.getElementById("logout-button");

    let historyChartInstance = null;
    let historyReportsCache = [];

    function showStatus(target, message, type) {
      target.innerHTML = `<div class="alert alert-${type} py-2 mb-0" role="alert">${message}</div>`;
    }

    function clearStatus(target) {
      target.innerHTML = "";
    }

    async function uploadCodeFile(file) {
      const formData = new FormData();
      formData.append("file", file);
      formData.append("user_id", userId);

      const response = await fetch("/api/analysis/upload", {
        method: "POST",
        body: formData,
      });

      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(data.detail || "No se pudo procesar el archivo.");
      }

      return data;
    }

    async function fetchHistoryData() {
      const response = await fetch(`/api/analysis/history/${userId}`);
      const data = await response.json().catch(() => []);
      if (!response.ok) {
        throw new Error("No se pudo obtener el historial de análisis.");
      }
      return Array.isArray(data) ? data : [];
    }

    function escapeCsvValue(value) {
      const raw = String(value ?? "");
      const escaped = raw.replace(/"/g, '""');
      return `"${escaped}"`;
    }

    function buildHistoryCsv(reports) {
      const sortedReports = [...reports].sort((a, b) => new Date(a.analysis_date) - new Date(b.analysis_date));
      const header = ["Fecha", "Proyecto", "LOC", "Complejidad"];
      const rows = sortedReports.map((report) => [
        report.analysis_date,
        report.project_name,
        report.loc,
        report.complexity,
      ]);
      const csvLines = [header, ...rows].map((row) => row.map(escapeCsvValue).join(","));
      return csvLines.join("\n");
    }

    function triggerCsvDownload(csvContent) {
      const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      const now = new Date();
      const timestamp = now.toISOString().replace(/[:.]/g, "-");
      anchor.href = url;
      anchor.download = `historial_analisis_${userId}_${timestamp}.csv`;
      document.body.appendChild(anchor);
      anchor.click();
      document.body.removeChild(anchor);
      URL.revokeObjectURL(url);
    }

    function drawHistoryChart(reports) {
      const sortedReports = [...reports].sort((a, b) => new Date(a.analysis_date) - new Date(b.analysis_date));
      const labels = sortedReports.map((report) => {
        const date = new Date(report.analysis_date);
        return `${date.toLocaleDateString()} ${date.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}`;
      });
      const complexityValues = sortedReports.map((report) => report.complexity);
      const locValues = sortedReports.map((report) => report.loc);

      const canvas = document.getElementById("historyChart");
      const context = canvas.getContext("2d");

      if (historyChartInstance) {
        historyChartInstance.destroy();
      }

      historyChartInstance = new Chart(context, {
        type: "line",
        data: {
          labels,
          datasets: [
            {
              label: "Complejidad Ciclomática",
              data: complexityValues,
              borderColor: "#0284c7",
              backgroundColor: "rgba(14, 165, 233, 0.2)",
              tension: 0.25,
              fill: true,
              pointRadius: 4,
              pointHoverRadius: 6,
              yAxisID: "y",
            },
            {
              label: "Líneas de Código (LOC)",
              data: locValues,
              borderColor: "#16a34a",
              backgroundColor: "rgba(34, 197, 94, 0.18)",
              tension: 0.25,
              fill: false,
              pointRadius: 4,
              pointHoverRadius: 6,
              borderDash: [6, 4],
              yAxisID: "yLoc",
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: true,
            },
            tooltip: {
              mode: "index",
              intersect: false,
            },
          },
          scales: {
            y: {
              beginAtZero: true,
              title: {
                display: true,
                text: "Complejidad",
              },
            },
            yLoc: {
              beginAtZero: true,
              position: "right",
              grid: {
                drawOnChartArea: false,
              },
              title: {
                display: true,
                text: "LOC",
              },
            },
            x: {
              title: {
                display: true,
                text: "Fecha de análisis",
              },
            },
          },
        },
      });
    }

    async function loadHistoryAndRender() {
      try {
        clearStatus(historyStatus);
        const reports = await fetchHistoryData();
        historyReportsCache = reports;
        drawHistoryChart(reports);

        if (reports.length === 0) {
          showStatus(historyStatus, "Aún no hay reportes para este usuario.", "info");
        }
      } catch (error) {
        showStatus(historyStatus, error.message || "Error al cargar historial.", "danger");
      }
    }

    uploadForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const selectedFile = codeFileInput.files[0];
      if (!selectedFile) {
        showStatus(uploadStatus, "Selecciona un archivo .java para continuar.", "warning");
        return;
      }

      if (!selectedFile.name.toLowerCase().endsWith(".java")) {
        showStatus(uploadStatus, "Solo se permiten archivos .java.", "warning");
        return;
      }

      try {
        showStatus(uploadStatus, "Procesando análisis...", "secondary");
        await uploadCodeFile(selectedFile);
        showStatus(uploadStatus, "Análisis guardado correctamente.", "success");
        await loadHistoryAndRender();
      } catch (error) {
        showStatus(uploadStatus, error.message || "Error al subir el archivo.", "danger");
      }
    });

    refreshBtn.addEventListener("click", () => {
      loadHistoryAndRender();
    });

    exportCsvBtn.addEventListener("click", () => {
      if (historyReportsCache.length === 0) {
        showStatus(historyStatus, "No hay historial para exportar.", "warning");
        return;
      }

      const csvContent = buildHistoryCsv(historyReportsCache);
      triggerCsvDownload(csvContent);
      showStatus(historyStatus, "CSV exportado correctamente.", "success");
    });

    logoutButton.addEventListener("click", () => {
      localStorage.removeItem("user_id");
      window.location.href = "/";
    });

    loadHistoryAndRender();
  </script>
</body>
</html>
